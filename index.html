<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN1TRIX - Cyber Showcase</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #demo {
            width: 100vw; height: 100vh;
            position: relative;
        }

        .card {
            position: absolute;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Текстовый блок Glassmorphism */
        #info {
            position: absolute;
            top: 50%; left: 5%;
            transform: translateY(-50%);
            z-index: 50;
            width: 90%;
            max-width: 500px;
            pointer-events: none;
            opacity: 0;
        }

        .place {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #aaa;
        }

        .title {
            font-size: clamp(30px, 7vw, 75px);
            font-weight: 900;
            line-height: 0.95;
            margin: 0;
            text-transform: uppercase;
        }

        .desc {
            margin-top: 25px;
            font-size: 15px;
            line-height: 1.7;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 5%;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .line { width: 40px; height: 1px; background: white; }

        .cover {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="cover">ZEN1TRIX DESIGN</div>

    <div class="controls">
        <span>Scroll to explore</span>
        <div class="line"></div>
    </div>

    <div id="demo"></div>
    
    <div id="info">
        <div class="place" id="place"></div>
        <h1 class="title" id="title1"></h1>
        <h1 class="title" id="title2"></h1>
        <div class="desc" id="desc"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        const data = [
            { 
                place: 'ZEN1TRIX SHOWCASE', 
                t1: 'CYBER', 
                t2: 'PROJECT', 
                desc: 'Профессиональный интерактивный слайдер. Стек технологий: GSAP, CSS Glassmorphism и кастомный JavaScript. Полное управление скроллом и адаптация под любые экраны.', 
                img: 'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=1600' // Киберпанк фон
            },
            { place: 'China', t1: 'HONG', t2: 'KONG', desc: 'Ультра-современный хаос мегаполиса, где свет неона пробивается сквозь густой туман и плотную застройку.', img: 'https://images.unsplash.com/photo-1507941097613-9f2157b69235?w=1600' },
            { place: 'Indonesia', t1: 'BALI', t2: 'TROPIC', desc: 'Дикие джунгли и древние храмы, утопающие в зелени под звуки тропического дождя и океана.', img: 'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=1600' },
            { place: 'Norway', t1: 'ARCTIC', t2: 'LOFOTEN', desc: 'Драматические пейзажи, где отвесные скалы вырастают прямо из ледяного океана.', img: 'https://images.unsplash.com/photo-1520263115673-610416f52ab6?w=1600' },
            { place: 'Japan', t1: 'TOKYO', t2: 'NEON', desc: 'Футуристический мегаполис, освещающий улицы яркими вывесками и цифровым шумом.', img: 'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=1600' },
            { place: 'Canada', t1: 'DEEP', t2: 'FOREST', desc: 'Умиротворяющая тишина канадских лесов и зеркальных озер.', img: 'https://images.unsplash.com/photo-1439337153520-7082a56a81f4?w=1600' }
        ];

        const demo = document.getElementById('demo');
        let order = data.map((_, i) => i);
        const cards = [];
        let isAnimating = false;

        data.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.backgroundImage = `url('${item.img}')`;
            demo.appendChild(card);
            cards.push(card);
        });

        function layout() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const isMobile = w < 768;
            
            const cardW = isMobile ? 90 : 160;
            const cardH = isMobile ? 130 : 240;
            const gap = isMobile ? 10 : 20;
            const rightEdge = w - (isMobile ? 15 : 40); 
            const topPos = h - cardH - (isMobile ? 15 : 40);

            order.forEach((dataIndex, visualIndex) => {
                const card = cards[dataIndex];
                if (visualIndex === 0) {
                    gsap.to(card, { width: w, height: h, top: 0, left: 0, borderRadius: 0, zIndex: 1, duration: 1.2, ease: "expo.inOut" });
                } else {
                    const leftPos = rightEdge - ((order.length - visualIndex) * (cardW + gap));
                    gsap.to(card, { width: cardW, height: cardH, top: topPos, left: leftPos, borderRadius: 15, zIndex: 10 + visualIndex, duration: 1.2, ease: "expo.inOut" });
                }
            });
            
            const current = data[order[0]];
            gsap.to("#info", { opacity: 0, x: -30, duration: 0.4, onComplete: () => {
                document.getElementById('place').innerText = current.place;
                document.getElementById('title1').innerText = current.t1;
                document.getElementById('title2').innerText = current.t2;
                document.getElementById('desc').innerText = current.desc;
                gsap.to("#info", { opacity: 1, x: 0, duration: 0.6, ease: "back.out(1.2)" });
            }});

            setTimeout(() => { isAnimating = false; }, 1200);
        }

        window.addEventListener('wheel', (e) => {
            if (isAnimating) return;
            isAnimating = true;
            if (e.deltaY > 0) order.push(order.shift());
            else order.unshift(order.pop());
            layout();
        }, { passive: true });

        window.onload = () => {
            layout();
            gsap.to('.cover', { yPercent: -100, duration: 1.5, delay: 0.5, ease: 'expo.inOut' });
        };

        window.onresize = () => { isAnimating = false; layout(); };
    </script>
</body>
</html>
